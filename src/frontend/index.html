<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>WebScrapper Control</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; }
    form { margin-bottom: 2rem; padding: 1rem; border: 1px solid #ddd; border-radius: 6px; }
    label { display:block; margin: .25rem 0; }
    input[type=text], input[type=number] { width: 320px; padding: .5rem; }
    button { padding: .5rem 1rem; }
    .msg { padding: .5rem; margin: .5rem 0; border-radius: 4px; }
    .ok { background: #e6ffed; border: 1px solid #b7eb8f; }
    .err { background: #fff1f0; border: 1px solid #ffa39e; }
    code { background: #f6f8fa; padding: .1rem .25rem; }
  </style>
</head>
<body>
  <h1>WebScrapper Control Panel</h1>
  <h2>Create Request</h2>
  <form method="post" action="{{ url_for('create_request') }}">
    <label>URL</label>
    <input type="text" name="url" required placeholder="https://example.com/" />
    <label>Chapters</label>
    <input type="number" name="chapters" min="1" value="1" required />
    <div style="margin-top:.5rem"><button type="submit">Create</button></div>
  </form>

  <h2>Add Website</h2>
  <form method="post" action="{{ url_for('add_website') }}">
    <label>Website URL</label>
    <input type="text" name="url" required placeholder="https://example.com/" />
    <div style="margin-top:.5rem"><button type="submit">Add</button></div>
  </form>

  <h2>Download Result</h2>
  <form method="get" action="{{ url_for('download_result') }}">
    <label>Request ID</label>
    <input type="number" name="request_id" min="1" required />
    <div style="margin-top:.5rem"><button type="submit">Download</button></div>
  </form>

</body>
</html>
